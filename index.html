<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Management System - Pro Edition</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-wrapper">
            <div class="login-box">
                <div class="login-header">
                    <h1 class="logo-text">OfficeHub Pro</h1>
                    <p class="tagline">Enterprise Management System</p>
                </div>

                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                        <span class="form-error"></span>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter your password" required>
                        <span class="form-error"></span>
                    </div>

                    <div class="form-group">
                        <label for="role">Login As</label>
                        <select id="role" required>
                            <option value="">Select your role</option>
                            <option value="boss">Boss/CEO</option>
                            <option value="manager">Manager</option>
                            <option value="employee">Employee</option>
                        </select>
                    </div>

                    <button type="submit" class="login-btn">Login</button>
                </form>

                <div class="demo-credentials">
                    <h3>Demo Login Credentials</h3>
                    <p><strong>Boss:</strong> boss@office.com / boss123</p>
                    <p><strong>Manager:</strong> manager@office.com / manager123</p>
                    <p><strong>Employee:</strong> employee@office.com / emp123</p>
                </div>
            </div>

            <div class="login-illustration">
                <div class="floating-shape shape-1"></div>
                <div class="floating-shape shape-2"></div>
                <div class="floating-shape shape-3"></div>
                <svg viewBox="0 0 200 200" class="svg-shape">
                    <circle cx="100" cy="100" r="80" fill="none" stroke="currentColor" stroke-width="2"/>
                    <path d="M 100 30 Q 150 50 150 100 T 100 170" fill="none" stroke="currentColor" stroke-width="2"/>
                </svg>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/TextPlugin.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login-animations.js"></script>
</body>
</html>
